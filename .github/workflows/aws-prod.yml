name: Deploy to Production Amazon ECS

on:
    push:
        branches: [ "master" ]
    pull_request:
        types: [ closed ]
        branches: [ "master" ]

env:
    AWS_REGION: ${{ secrets.AWS_REGION }}
    ECR_REPOSITORY: "${{ secrets.ECR_REPOSITORY }}-${{ github.ref_name }}"
    ECS_SERVICE: "${{ secrets.ECS_SERVICE }}-${{ github.ref_name }}"
    ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}

permissions:
    contents: read

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        environment: production

        steps:
            -   name: Checkout
                uses: actions/checkout@v3
            -   name: show ref
                run: echo ${{ github.ref_name }}
            -   name: Configure AWS credentials
                uses: aws-actions/configure-aws-credentials@v1
                with:
                    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                    aws-region: ${{ env.AWS_REGION }}
            -   name: Login to Amazon ECR
                id: login-ecr
                uses: aws-actions/amazon-ecr-login@v1
            -   name: Build, tag, and push image to Amazon ECR
                id: build-image
                env:
                    ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                    IMAGE_TAG: ${{ github.sha }}
                run: |
                    docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
                    docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
                    echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:latest" >> $GITHUB_OUTPUT

            -   name: Set up Go
                uses: actions/setup-go@v4
                with:
                    go-version: '1.20'

            -   name: Setup Mimir
                uses: one-premex/iluma.mimir@main
                with:
                    action: setup
                    github-token: ${{ secrets.GH_ACCESS_TOKEN }}

            -   name: Clear all task and run a new one
                uses: one-premex/iluma.mimir@main
                with:
                    action: clear-ecs-tasks
