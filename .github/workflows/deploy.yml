name: Deploy backend al VPS

# Se ejecuta al hacer merge/push a main, o manualmente desde la pestaña Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Crear carpeta destino en el VPS
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p /root/motogestion"

      - name: Subir código (rsync)
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            --exclude 'node_modules' \
            -e "ssh -i ~/.ssh/id_deploy" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/root/motogestion/"

      - name: Build + restart del contenedor
        run: |
          ssh -i ~/.ssh/id_deploy "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "cd /root/motogestion && docker compose -f docker-compose.prod.yml up -d --build && docker image prune -f"
