<!DOCTYPE html>
<html lang="en">

<head>
    {% block head %}
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        .email-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .email-header {
            text-align: center;
            padding: 20px;
            background-color: #f0f0f0;
        }

        .email-title {
            margin: 0;
            font-size: 24px;
            color: #4a4a4a;
        }

        .email-content {
            padding: 20px;
        }

        .email-paragraph {
            margin-bottom: 20px;
        }

        .info-table {
            width: 100%;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .info-table td {
            padding: 10px;
        }

        .info-table-label {
            font-weight: bold;
            width: 30%;
        }

        .cta-button {
            background-color: #0066cc;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
        }
        .cta-button, .cta-button a {
    color: #ffffff !important;
}


        .email-footer {
            background-color: #f8f8f8;
            padding: 20px;
            text-align: center;
        }

        .footer-text {
            margin: 0;
            font-size: 14px;
            color: #888888;
        }

        .text-center {
            text-align: center;
        }

        .bg-blue {
            background-color: #f0f7ff;
        }

        .text-blue {
            color: #0066cc;
        }

        .text-pink {
            color: #cc0066;
        }

        .text-white {
            color: #fff0f5;
        }

        .bg-pink {
            background-color: #fff0f5;
        }
        .card-table {
            border: 1px solid #ddd;
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
        }

        .email-subtitle {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .unit-table{
            width: 100%;
            border-collapse: collapse;
        }
        .unit-table th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #f0f0f0;
        }

        .totals {
            font-weight: bold;
            background: #e8e8e8;
            border-collapse: collapse;
        }

        .overall-totals {
            text-align: right;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            border: 1px solid #ddd;
            padding: 8px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
          .detail-table {
            width: 100%;
            border-collapse: collapse;
        }

        .th-like {
            background: #f0f0f0;
            font-weight: bold;
            text-align: left;
        }


    </style>
    {% endblock %}
</head>

<body>
    <div id="content">{% block content %}{% endblock %}</div>
    <div id="footer">
        {% block footer %} &copy; Copyright 2025 by <a href="https://iluma.bio/">Iluma</a>. {% endblock %}
    </div>
</body>

</html>
