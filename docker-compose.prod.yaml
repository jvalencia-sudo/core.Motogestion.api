# Docker Compose para producción/staging
# Este archivo es principalmente para referencia y testing local de la configuración de producción
services:
    api:
        build:
            context: .
            dockerfile: Dockerfile.prod
        ports:
            - "8000:8000"
        restart: always
        environment:
            - PYTHONUNBUFFERED=1
        # En producción, las variables de entorno se configuran en Cloud Run/GKE
        # No usar env_file en producción por seguridad
