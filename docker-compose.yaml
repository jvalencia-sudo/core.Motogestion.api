# Docker Compose para desarrollo local (multi-tenant).
# Levanta PostgreSQL y, en el PRIMER arranque, ejecuta db/init/:
#   00_roles.sql  -> crea el rol mt_app (NO superusuario) y lo hace dueño del schema
#   01_load.sql   -> carga el esquema multi-tenant COMO mt_app (para que el RLS aplique)
# La app FastAPI se corre aparte con `uv run python main.py` conectando como mt_app.
#
# Uso:
#   docker compose up -d
#   docker compose ps            # motogestion-db (healthy)
#   docker compose logs -f db
#   docker compose down -v       # borra el volumen y recarga todo desde cero
#
# Admin de Postgres = postgres/postgres (solo para administrar el contenedor).
# La app NUNCA usa el admin: usa mt_app (no-superusuario) para que el RLS aísle por taller.
services:
    db:
        image: postgres:16
        container_name: motogestion-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ${DB_NAME:-motogestion}
        ports:
            - "${DB_PORT:-5432}:5432"
        volumes:
            # Se ejecutan en orden alfabético solo cuando el volumen está vacío.
            - ./db/init:/docker-entrypoint-initdb.d:ro
            # El esquema multi-tenant, montado para que 01_load.sql lo cargue con \i.
            - ./db/full_schema_v2_multitenant.sql:/schema.sql:ro
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-motogestion}"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    pgdata:
